spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:outreach_db}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:outreach_user}
    password: ${DB_PASSWORD:outreach_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      leak-detection-threshold: 60000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        jdbc:
          time_zone: UTC
        order_inserts: true
        order_updates: true
        jdbc.batch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    out-of-order: false
    validate-on-migrate: true
    repair-on-migrate: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 15MB

  mail:
    host: smtp.gmail.com
    port: 587
    properties:
      mail.smtp:
        auth: true
        starttls.enable: true
        connectiontimeout: 10000
        timeout: 10000
        writetimeout: 10000

server:
  port: 8080
  error:
    include-message: never
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never
  server:
    port: 8080

app:
  base-url: ${BASE_URL:http://localhost:8080}

  jwt:
    secret: ${JWT_SECRET:your-256-bit-secret-key-change-in-production-min-32chars}
    expiration: 86400000

  credential:
    key: ${CREDENTIAL_KEY:${app.jwt.secret}}

  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}

  ollama:
    base-url: ${OLLAMA_URL:http://localhost:11434}
    default-model: ${OLLAMA_MODEL:qwen3}
    timeout: 120

  upload:
    resume-dir: ${UPLOAD_DIR:/app/uploads/resumes}

logging:
  level:
    com.outreach: INFO
    org.springframework.security: WARN
    org.flywaydb: WARN
    org.hibernate.SQL: WARN
  file:
    name: logs/outreach.log
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 7